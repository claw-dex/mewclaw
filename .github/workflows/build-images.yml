name: Build and Push Docker Images

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to push (e.g. latest, v1.2.3)"
        required: false
        default: "latest"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - agent: base
            agent_dna: v1/base
            image: ghcr.io/claw-dex/base
          - agent: codasst
            agent_dna: v1/codasst
            image: ghcr.io/claw-dex/codasst
          - agent: engagius
            agent_dna: v1/engagius
            image: ghcr.io/claw-dex/engagius
          - agent: proximate
            agent_dna: v1/proximate
            image: ghcr.io/claw-dex/proximate

    steps:
      - name: Checkout mewclaw
        uses: actions/checkout@v4

      - name: Clone claw-dna branch (${{ matrix.agent_dna }})
        run: |
          rm -rf "${{ matrix.agent_dna }}"
          git clone \
            --branch "${{ matrix.agent_dna }}" \
            --single-branch \
            --depth=1 \
            https://github.com/claw-dex/claw-dna.git \
            "${{ matrix.agent_dna }}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tags (push to branch / version tag)
        id: meta
        if: github.event_name != 'workflow_dispatch'
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{raw}}

      - name: Generate image tags (workflow_dispatch)
        id: meta_dispatch
        if: github.event_name == 'workflow_dispatch'
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=${{ inputs.image_tag }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ github.event_name == 'workflow_dispatch' && steps.meta_dispatch.outputs.tags || steps.meta.outputs.tags }}
          labels: ${{ github.event_name == 'workflow_dispatch' && steps.meta_dispatch.outputs.labels || steps.meta.outputs.labels }}
          build-args: |
            AGENT_DNA=${{ matrix.agent_dna }}
          cache-from: type=gha,scope=${{ matrix.agent }}
          cache-to: type=gha,mode=max,scope=${{ matrix.agent }}
