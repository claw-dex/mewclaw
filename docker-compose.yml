# ══════════════════════════════════════════════════════════════
#  docker-compose.yml — Development mode
#
#  Mounts scripts, prompts, and server.py from the host so you
#  can edit and test without rebuilding the image.
#
#  Prerequisites:
#    docker build -t myagent:seed .
#
#  Usage:
#    docker compose up -d            # start
#    docker compose logs -f          # watch bootstrap
#    docker exec -it myagent claude  # authenticate
#    docker compose down             # stop & remove
#    docker compose down -v          # stop & wipe all state
# ══════════════════════════════════════════════════════════════

services:
  agent:
    image: myagent:seed
    deploy:
      resources:
        limits:
          cpus: '2'      # Caps usage at 200% (2 full cores)
        reservations:
          cpus: '0.25'    # Guarantees at least 0.25 CPU core
    build:
      context: .
      dockerfile: Dockerfile
      args:
        AGENT_DNA: ${AGENT_DNA:-v1/base}
    container_name: myagent
    ports:
      - "8080:8080"
    volumes:
      # ── Persist agent state across container recreations ──
      - agent-memory:/agent/memory
      - agent-messages:/agent/messages
      - agent-workspace:/agent/workspace

      # ── Persist Claude credentials across image rebuilds ──
      - agent-claude-home:/home/agent/.claude
      - agent-keepass-home:/home/agent/.keepass
      - agent-config-home:/home/agent/.config
    restart: unless-stopped

volumes:
  agent-memory:
  agent-messages:
  agent-workspace:
  agent-claude-home:
  agent-keepass-home:
  agent-config-home:
