# ══════════════════════════════════════════════════════════════
#  docker-compose.yml — Development mode
#
#  Builds and runs all 3 MewClaw agents on different ports.
#
#  Prerequisites:
#    docker compose build
#
#  Usage:
#    docker compose up -d              # start all agents
#    docker compose logs -f codasst   # watch a specific agent
#    docker exec -it mewclaw-codasst claude  # authenticate
#    docker compose down               # stop & remove
#    docker compose down -v            # stop & wipe named volumes
# ══════════════════════════════════════════════════════════════

x-agent-base: &agent-base
  deploy:
    resources:
      limits:
        cpus: '2'       # Caps usage at 200% (2 full cores)
      reservations:
        cpus: '0.25'    # Guarantees at least 0.25 CPU core
  restart: unless-stopped

services:
  codasst:
    <<: *agent-base
    image: ghcr.io/claw-dex/codasst:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        AGENT_DNA: v1/codasst
    container_name: mewclaw-codasst
    ports:
      - "8080:8080"
    volumes:
      - agent-claude-home:/home/agent/.claude
      - agent-keepass-home:/home/agent/.keepass
      - agent-config-home:/home/agent/.config
      - ./shared/workspace:/agent/workspace
      # ── Per-agent state ──
      - ./codasst/memory:/agent/memory
      - ./codasst/messages:/agent/messages

  engagius:
    <<: *agent-base
    image: ghcr.io/claw-dex/engagius:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        AGENT_DNA: v1/engagius
    container_name: mewclaw-engagius
    ports:
      - "8180:8080"
    volumes:
      - agent-claude-home:/home/agent/.claude
      - agent-keepass-home:/home/agent/.keepass
      - agent-config-home:/home/agent/.config
      - ./shared/workspace:/agent/workspace
      # ── Per-agent state ──
      - ./engagius/memory:/agent/memory
      - ./engagius/messages:/agent/messages

  proximate:
    <<: *agent-base
    image: ghcr.io/claw-dex/proximate:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        AGENT_DNA: v1/proximate
    container_name: mewclaw-proximate
    ports:
      - "8280:8080"
    volumes:
      - agent-claude-home:/home/agent/.claude
      - agent-keepass-home:/home/agent/.keepass
      - agent-config-home:/home/agent/.config
      - ./shared/workspace:/agent/workspace
      # ── Per-agent state ──
      - ./proximate/memory:/agent/memory
      - ./proximate/messages:/agent/messages

volumes:
  agent-claude-home:
  agent-keepass-home:
  agent-config-home:
